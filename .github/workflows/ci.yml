name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Sentrux
        run: curl -fsSL https://raw.githubusercontent.com/sentrux/sentrux/main/install.sh | sh

      - name: Auto-format and Migrate (Dependabot only)
        if: github.actor == 'dependabot[bot]'
        run: |
          npx @biomejs/biome migrate --write
          npm run format

      - name: Commit formatting (Dependabot only)
        if: github.actor == 'dependabot[bot]'
        run: |
          git config --global user.name 'dependabot[bot]'
          git config --global user.email '49699333+dependabot[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: apply biome formatting"
            git push
          fi

      - name: Check
        run: npm run check

      - name: Run tests
        run: npm run test:all

  publish:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Clear npm auth token (OIDC will authenticate)
        run: npm config delete //registry.npmjs.org/:_authToken --location project

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        run: npm publish --provenance --access public

  deploy-pages:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build reactive example
        run: npm run build:reactive

      - name: Prepare pages artifact
        run: |
          mkdir _site
          cp example/reactive/index.html _site/
          cp example/reactive/app.js _site/
          cp example/reactive/reactive.js _site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
