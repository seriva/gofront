name: CI/CD

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    release:
        types: [published]
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "25.x"

            - name: Install dependencies
              run: npm install

            - name: Run linter
              run: npm run check

            - name: Run tests
              run: npm test

    publish:
        needs: test
        if: github.event_name == 'release'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "25.x"

            - name: Clear npm auth token (OIDC will authenticate)
              run: npm config delete //registry.npmjs.org/:_authToken --location project

            - name: Install dependencies
              run: npm install

            - name: Publish to npm
              run: npm publish --provenance --access public

    deploy-pages:
        needs: test
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "25.x"

            - name: Install dependencies
              run: npm install

            - name: Build reactive example
              run: npm run build:reactive

            - name: Prepare pages artifact
              run: |
                  mkdir _site
                  cp example/reactive/index.html _site/
                  cp example/reactive/app.js _site/
                  cp example/reactive/reactive.js _site/

            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@v3

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
