name: CI/CD

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    release:
        types: [published]
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "24.x"

            - name: Install dependencies
              run: npm install

            - name: Run linter
              run: npm run check

            - name: Run tests
              run: npm test

    publish:
        needs: test
        if: github.event_name == 'release'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "24.x"

            - name: Clear npm auth token (OIDC will authenticate)
              run: npm config delete //registry.npmjs.org/:_authToken --location project

            - name: Install dependencies
              run: npm install

            - name: Publish to npm
              run: npm publish --provenance --access public
